name: Build and Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build image in ACR
        run: |
          az acr build \
            --registry ${{ secrets.ACR_NAME }} \
            --image lbsnaa-form-builder:${{ github.sha }} \
            --image lbsnaa-form-builder:latest \
            .

      - name: Deploy to App Service
        run: |
          az webapp config container set \
            --name ${{ secrets.APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --container-image-name ${{ secrets.ACR_LOGIN_SERVER }}/lbsnaa-form-builder:${{ github.sha }}

          az webapp restart \
            --name ${{ secrets.APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }}

      - name: Wait for app to come up
        run: sleep 90

      - name: Verify health
        run: |
          HEALTH_URL="https://${{ secrets.APP_NAME }}.azurewebsites.net/health"
          echo "Hitting $HEALTH_URL"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /tmp/health.json -w "%{http_code}" "$HEALTH_URL" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed:"
              cat /tmp/health.json
              exit 0
            fi
            echo "Attempt $i: status $STATUS, retrying in 30s..."
            sleep 30
          done
          echo "Health check failed after 5 attempts"
          cat /tmp/health.json || true
          exit 1
