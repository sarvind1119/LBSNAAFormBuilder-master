{% extends "base.html" %}
{% block title %}Change Password - LBSNAA Admin{% endblock %}

{% block nav %}
<nav class="bg-white shadow-sm border-b">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-16">
        <a href="{{ url_for('admin_dashboard') }}" class="text-lg font-bold text-gray-900 hover:text-accent-600">&larr; Dashboard</a>
        <a href="{{ url_for('admin_logout') }}" class="text-gray-500 hover:text-gray-700 text-sm">Logout</a>
    </div>
</nav>
{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <h2 class="text-xl font-semibold text-gray-800 mb-6">Change Password</h2>

    <div class="bg-white rounded-xl shadow-sm border p-6">
        <form method="POST" class="space-y-5">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div>
                <label for="current_password" class="block text-sm font-medium text-gray-700 mb-1">Current Password *</label>
                <input type="password" name="current_password" id="current_password" required autofocus
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-accent-500 focus:border-accent-500 outline-none">
            </div>

            <div>
                <label for="new_password" class="block text-sm font-medium text-gray-700 mb-1">New Password *</label>
                <input type="password" name="new_password" id="new_password" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-accent-500 focus:border-accent-500 outline-none">
                <p class="text-xs text-gray-400 mt-1">Minimum 4 characters</p>
            </div>

            <div>
                <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-1">Confirm New Password *</label>
                <input type="password" name="confirm_password" id="confirm_password" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-accent-500 focus:border-accent-500 outline-none">
            </div>

            <div class="flex items-center gap-4 pt-2">
                <button type="submit" class="bg-accent-600 hover:bg-accent-700 text-white font-medium py-2.5 px-6 rounded-lg transition">
                    Change Password
                </button>
                <a href="{{ url_for('admin_dashboard') }}" class="text-gray-500 hover:text-gray-700">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
